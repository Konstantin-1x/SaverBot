name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - uses: gradle/actions/wrapper-validation@v6
      - name: Run unit and PostgreSQL integration tests
        run: ./gradlew clean test --no-daemon
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test
          retention-days: 7

  container:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - run: ./gradlew bootJar --no-daemon
      - name: Build application and operations images
        run: docker compose build
        env:
          BOT_TOKEN: ci-placeholder
          BOT_USERNAME: ci-placeholder
          DB_PASSWORD: ci-placeholder-password
          DATA_HASH_KEY: ci-placeholder-data-hash-key-at-least-32-characters
          BACKUP_ENCRYPTION_KEY: ci-placeholder-backup-key-at-least-32-characters

